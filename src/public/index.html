<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Voice Demo <span id="connectionStatus" class="connection-status disconnected">Отключено</span></h2>

<button id="talkBtn" disabled class="disabled">Hold to talk</button>

<label style="display:block; margin-top:15px;">
  <input type="checkbox" id="voiceToggle" />
  Озвучивать ответ
</label>

<h3>История диалога:</h3>
<div id="historyContainer"></div>
<button id="clearHistoryBtn" class="clear-history-btn">Очистить историю</button>

<h3>Вы сказали:</h3>
<div id="userText"></div>

<h3>Ответ модели:</h3>
<div id="assistantText"></div>

<script type="module" src="app.js"></script>
</body>
</html>
