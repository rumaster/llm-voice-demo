<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Demo</title>
  <style>
    body { font-family: Arial; padding: 30px; }
    button {
      padding: 20px 40px;
      font-size: 18px;
    }
    button.recording {
      background: red;
      color: white;
    }
    #userText, #assistantText {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      min-height: 40px;
      white-space: pre-wrap;
    }
    #historyContainer {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      max-height: 300px;
      overflow-y: auto;
      background-color: #f9f9f9;
    }
    .history-item {
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    .history-item.user {
      background-color: #e3f2fd;
      margin-left: 20px;
    }
    .history-item.assistant {
      background-color: #f5f5f5;
      margin-right: 20px;
    }
    .history-role {
      font-weight: bold;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .clear-history-btn {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .connection-status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      margin-left: 15px;
    }
    .connection-status.connected {
      background-color: #c8e6c9;
      color: #2e7d32;
    }
    .connection-status.disconnected {
      background-color: #ffcdd2;
      color: #c62828;
    }
    button:disabled, button.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<h2>Voice Demo <span id="connectionStatus" class="connection-status disconnected">Отключено</span></h2>

<button id="talkBtn" disabled class="disabled">Hold to talk</button>

<label style="display:block; margin-top:15px;">
  <input type="checkbox" id="voiceToggle" />
  Озвучивать ответ
</label>

<h3>История диалога:</h3>
<div id="historyContainer"></div>
<button id="clearHistoryBtn" class="clear-history-btn">Очистить историю</button>

<h3>Вы сказали:</h3>
<div id="userText"></div>

<h3>Ответ модели:</h3>
<div id="assistantText"></div>

<script type="module" src="app.js"></script>
</body>
</html>
